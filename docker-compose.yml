version: '3.8'
services:
  db:
    image: postgres:15
    container_name: cookbook-db
    environment:
      POSTGRES_DB: cookbook_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./cookbookworkbook.sql:/docker-entrypoint-initdb.d/cookbookworkbook.sql

  app:
    build: .
    container_name: cookbook-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cookbook_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
    depends_on:
      - db

  ui:
    build: ./cookbook-frontend
    container_name: cookbook-ui
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  postgres_data:
